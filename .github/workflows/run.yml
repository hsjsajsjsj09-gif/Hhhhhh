name: Windows RDP VPS (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Thời gian giữ máy chạy (phút, tối đa 360)"
        required: false
        default: "180"
      rdp_username:
        description: "Tên user RDP"
        required: false
        default: "runneradmin"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 395
    env:
      RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate input and secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:RDP_PASSWORD) {
            throw "Thiếu secret RDP_PASSWORD"
          }

          if (-not $env:TAILSCALE_AUTHKEY) {
            throw "Thiếu secret TAILSCALE_AUTHKEY"
          }

          $duration = [int]"${{ github.event.inputs.duration_minutes || '180' }}"
          if ($duration -lt 30) { $duration = 30 }
          if ($duration -gt 360) { $duration = 360 }

          $username = "${{ github.event.inputs.rdp_username || 'runneradmin' }}"
          if ([string]::IsNullOrWhiteSpace($username)) {
            $username = "runneradmin"
          }

          "DURATION_MINUTES=$duration" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RDP_USERNAME=$username" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Input hợp lệ. Duration=$duration phút, Username=$username"

      - name: Setup local admin and enable RDP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $username = $env:RDP_USERNAME
          $pass = $env:RDP_PASSWORD
          $sec = ConvertTo-SecureString $pass -AsPlainText -Force

          if (!(Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $username -Password $sec -FullName "GitHub RDP User"
          } else {
            Set-LocalUser -Name $username -Password $sec
          }

          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue

          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

          Write-Host "Đã bật RDP cho user: $username"

      - name: Install Tailscale
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec -ArgumentList '/i','ts.msi','/quiet','/norestart' -Wait
          Start-Sleep -Seconds 10
          Write-Host "Đã cài Tailscale"

      - name: Connect Tailscale with auth key
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          $hostname = "gh-rdp-${{ github.run_id }}"
          & $ts up --authkey="$env:TAILSCALE_AUTHKEY" --hostname="$hostname" --accept-routes --accept-dns=false --ssh=false

          Start-Sleep -Seconds 3
          $ip = (& $ts ip -4 | Select-Object -First 1).Trim()

          if (-not $ip) {
            throw "Không lấy được IP Tailscale"
          }

          "RDP_HOST=$ip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "${ip}:3389|$($env:RDP_USERNAME)" | Out-File info.txt -Encoding utf8 -NoNewline
          Write-Host "Tailscale IP: $ip"

      - name: Upload connection info artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: info.txt
          overwrite: true

      - name: Keep alive
        shell: pwsh
        run: |
          $minutes = [int]$env:DURATION_MINUTES
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          Write-Host "======================================"
          Write-Host "Windows RDP VPS is ready"
          Write-Host "Host: $env:RDP_HOST"
          Write-Host "Port: 3389"
          Write-Host "User: $env:RDP_USERNAME"
          Write-Host "Duration: $minutes phút"
          Write-Host "======================================"

          for ($m = 1; $m -le $minutes; $m++) {
            if ($m % 15 -eq 0) {
              try {
                $ip = (& $ts ip -4 | Select-Object -First 1).Trim()
                Write-Host "[$m/$minutes] Alive - $ip"
              } catch {
                Write-Host "[$m/$minutes] Alive - Không kiểm tra được Tailscale"
              }
            }
            Start-Sleep -Seconds 60
          }
